name: Deploy Card Vault to GitHub Pages

# Publishes the docs/ PWA to GitHub Pages. `configure-pages` with
# enablement:true turns Pages on automatically, so nobody has to flip a setting
# in the repo UI. Runs on every push to main and can be run on demand.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Regenerate docs/data.json from the catalog so the live app always
      # reflects data/inventory.csv. build_web.py is standard-library only
      # (no eBay keys needed), so no pip install is required.
      - name: Rebuild app data from catalog
        run: python3 build_web.py

      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
